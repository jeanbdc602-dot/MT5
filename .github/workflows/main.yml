name: Update Trading Data

on:
  schedule:
    # Se ejecuta cada 1 minuto
    - cron: '* * * * *'
  
  # Botón manual en la pestaña Actions
  workflow_dispatch: 

# AGREGAMOS ESTO: Permiso explícito para que el bot pueda subir archivos al repositorio
permissions:
  contents: write

# AQUÍ ESTÁ LA SOLUCIÓN DEFINITIVA AL AVISO DE NODE.JS 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Volvemos a Ubuntu porque es más rápido y compatible con llamadas a APIs web
    runs-on: ubuntu-latest
    
    steps:
      # 1. Descarga el código de tu repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4
      
      # 2. Instala Python en el servidor de GitHub
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      # 3. Instala las librerías necesarias (json y os ya vienen por defecto en Python)
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      # 4. Ejecuta tu script
      - name: Ejecutar script update_data.py
        run: python update_data.py
        
      # 5. Guarda el nuevo JSON y lo sube a GitHub
      - name: Subir cambios a GitHub (Commit & Push)
        shell: bash
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add datos_trading.json
          # Esto evita errores si el script no generó cambios nuevos en el JSON ese minuto
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática de datos JSON"
          git push

name: Update Trading Data

on:
  schedule:
    # Se ejecuta cada 1 minuto (para pruebas)
    - cron: '* * * * *'
  
  # Botón manual en la pestaña Actions
  workflow_dispatch: 

# Permiso explícito para que el bot pueda subir el JSON modificado a tu repositorio
permissions:
  contents: write

# Solución definitiva al aviso de Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Descarga el código de tu repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4
      
      # 2. Instala Python en el servidor de GitHub
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      # 3. Instala las librerías necesarias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      # 4. Ejecuta tu script (AQUÍ SE PASAN LAS CREDENCIALES SECRETAS)
      - name: Ejecutar script update_data.py
        env:
          MYFXBOOK_EMAIL: ${{ secrets.MYFXBOOK_EMAIL }}
          MYFXBOOK_PASSWORD: ${{ secrets.MYFXBOOK_PASSWORD }}
        run: python update_data.py
        
      # 5. Guarda el nuevo JSON y lo sube a GitHub
      - name: Subir cambios a GitHub (Commit & Push)
        shell: bash
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add datos_trading.json
          # Esto evita errores si el script no generó cambios nuevos en el JSON en ese minuto
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática de datos JSON"
          git push
